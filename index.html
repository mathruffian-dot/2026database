<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級成績記錄本</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 20px; }

        /* 標題 */
        header {
            text-align: center;
            padding: 30px 0 20px;
        }
        header h1 {
            font-size: 28px;
            color: #1a73e8;
            margin-bottom: 8px;
        }
        header p { color: #666; font-size: 14px; }

        /* 使用者列 */
        .user-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #555;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .btn-logout {
            padding: 6px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
            font-size: 13px;
            cursor: pointer;
            color: #666;
        }
        .btn-logout:hover { background: #f5f5f5; }

        /* 登入畫面 */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        .login-card h1 {
            font-size: 24px;
            color: #1a73e8;
            margin-bottom: 8px;
        }
        .login-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .btn-google {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: box-shadow 0.2s;
            color: #333;
        }
        .btn-google:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .btn-google img { width: 20px; height: 20px; }

        /* 新增表單 */
        .form-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .form-card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #1a73e8;
        }
        .form-row {
            display: grid;
            grid-template-columns: 80px 1fr 1fr 1fr 1fr auto;
            gap: 12px;
            align-items: end;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1a73e8;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #1a73e8;
            color: #fff;
        }
        .btn-primary:hover { background: #1557b0; }
        .btn-danger {
            background: #ea4335;
            color: #fff;
            padding: 4px 10px;
            font-size: 13px;
        }
        .btn-danger:hover { background: #c5221f; }

        /* 成績表格 */
        .table-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .table-header h2 {
            font-size: 18px;
            color: #1a73e8;
        }
        .student-count {
            font-size: 14px;
            color: #666;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f8f9fa;
            padding: 12px 8px;
            text-align: center;
            font-size: 14px;
            color: #555;
            border-bottom: 2px solid #e0e0e0;
        }
        td {
            padding: 10px 8px;
            text-align: center;
            font-size: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        tr:hover td { background: #f8f9fa; }
        .rank-1 { color: #ea4335; font-weight: bold; }
        .rank-2 { color: #fa7b17; font-weight: bold; }
        .rank-3 { color: #34a853; font-weight: bold; }

        /* 統計列 */
        .stats-row {
            background: #e8f0fe !important;
            font-weight: bold;
        }
        .stats-row td { border-bottom: none; color: #1a73e8; }

        /* 訊息 */
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .message.success { display: block; background: #e6f4ea; color: #137333; }
        .message.error { display: block; background: #fce8e6; color: #c5221f; }

        /* 空狀態 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* 載入中 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* 隱藏 */
        .hidden { display: none !important; }

        /* RWD */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
            }
            .form-row .form-group:first-child {
                grid-column: 1;
            }
            .form-row .btn { grid-column: 1 / -1; }
            table { font-size: 13px; }
            th, td { padding: 8px 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登入畫面 -->
        <div id="loginScreen" class="login-screen">
            <div class="login-card">
                <h1>📊 班級成績記錄本</h1>
                <p>使用 Google 帳號登入以存取成績資料</p>
                <button class="btn-google" onclick="loginWithGoogle()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    使用 Google 帳號登入
                </button>
            </div>
        </div>

        <!-- 主畫面（登入後顯示） -->
        <div id="mainScreen" class="hidden">
            <div class="user-bar">
                <div class="user-info">
                    <img id="userAvatar" class="user-avatar" src="" alt="">
                    <span id="userName"></span>
                </div>
                <button class="btn-logout" onclick="logout()">登出</button>
            </div>

            <header>
                <h1>📊 班級成績記錄本</h1>
                <p>輸入學生成績，自動計算總分、平均與排名</p>
            </header>

            <div id="message" class="message"></div>

            <!-- 新增成績表單 -->
            <div class="form-card">
                <h2>➕ 新增學生成績</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>座號</label>
                        <input type="number" id="seat" min="1" max="99" placeholder="1">
                    </div>
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="name" placeholder="學生姓名">
                    </div>
                    <div class="form-group">
                        <label>國文</label>
                        <input type="number" id="chinese" min="0" max="100" placeholder="0-100">
                    </div>
                    <div class="form-group">
                        <label>英文</label>
                        <input type="number" id="english" min="0" max="100" placeholder="0-100">
                    </div>
                    <div class="form-group">
                        <label>數學</label>
                        <input type="number" id="math" min="0" max="100" placeholder="0-100">
                    </div>
                    <button class="btn btn-primary" onclick="addStudent()">新增</button>
                </div>
            </div>

            <!-- 成績表格 -->
            <div class="table-card">
                <div class="table-header">
                    <h2>📋 全班成績</h2>
                    <span class="student-count" id="studentCount"></span>
                </div>
                <div id="tableArea">
                    <div class="loading">載入中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase 連線設定
        const SUPABASE_URL = 'https://xxbjykdheracbfmwpxwm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jEWTh7zeVxg4g2bWACiRrA_RdVaXQk0';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 登入狀態監聽
        db.auth.onAuthStateChange((event, session) => {
            if (session) {
                showMainScreen(session.user);
            } else {
                showLoginScreen();
            }
        });

        // Google 登入
        async function loginWithGoogle() {
            const { error } = await db.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + window.location.pathname
                }
            });
            if (error) alert('登入失敗：' + error.message);
        }

        // 登出
        async function logout() {
            await db.auth.signOut();
        }

        // 顯示登入畫面
        function showLoginScreen() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainScreen').classList.add('hidden');
        }

        // 顯示主畫面
        function showMainScreen(user) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');

            // 顯示使用者資訊
            const avatar = user.user_metadata?.avatar_url || '';
            const name = user.user_metadata?.full_name || user.email;
            document.getElementById('userAvatar').src = avatar;
            document.getElementById('userName').textContent = name;

            loadStudents();
        }

        // 顯示訊息
        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message ' + type;
            setTimeout(() => { el.className = 'message'; }, 3000);
        }

        // 載入全班成績
        async function loadStudents() {
            const { data, error } = await db
                .from('students')
                .select('*')
                .order('seat_number');

            if (error) {
                showMessage('載入失敗：' + error.message, 'error');
                return;
            }

            const area = document.getElementById('tableArea');
            const countEl = document.getElementById('studentCount');

            if (!data || data.length === 0) {
                area.innerHTML = '<div class="empty-state">尚無學生資料，請新增第一筆成績</div>';
                countEl.textContent = '';
                return;
            }

            // 計算排名（依總分排序）
            const sorted = [...data].sort((a, b) => b.total - a.total);
            const rankMap = {};
            sorted.forEach((s, i) => { rankMap[s.id] = i + 1; });

            // 計算班級統計
            const count = data.length;
            const avgChinese = (data.reduce((s, d) => s + d.chinese, 0) / count).toFixed(1);
            const avgEnglish = (data.reduce((s, d) => s + d.english, 0) / count).toFixed(1);
            const avgMath = (data.reduce((s, d) => s + d.math, 0) / count).toFixed(1);
            const avgTotal = (data.reduce((s, d) => s + d.total, 0) / count).toFixed(1);
            const avgAverage = (data.reduce((s, d) => s + parseFloat(d.average), 0) / count).toFixed(2);

            countEl.textContent = `共 ${count} 位學生`;

            let html = `<table>
                <thead><tr>
                    <th>排名</th><th>座號</th><th>姓名</th>
                    <th>國文</th><th>英文</th><th>數學</th>
                    <th>總分</th><th>平均</th><th>操作</th>
                </tr></thead><tbody>`;

            data.forEach(s => {
                const rank = rankMap[s.id];
                const rankClass = rank <= 3 ? `rank-${rank}` : '';
                html += `<tr>
                    <td class="${rankClass}">${rank}</td>
                    <td>${s.seat_number}</td>
                    <td>${s.name}</td>
                    <td>${s.chinese}</td>
                    <td>${s.english}</td>
                    <td>${s.math}</td>
                    <td><strong>${s.total}</strong></td>
                    <td>${parseFloat(s.average).toFixed(2)}</td>
                    <td><button class="btn btn-danger" onclick="deleteStudent(${s.id})">刪除</button></td>
                </tr>`;
            });

            html += `<tr class="stats-row">
                <td colspan="3">班級平均</td>
                <td>${avgChinese}</td><td>${avgEnglish}</td><td>${avgMath}</td>
                <td>${avgTotal}</td><td>${avgAverage}</td><td></td>
            </tr>`;

            html += '</tbody></table>';
            area.innerHTML = html;
        }

        // 新增學生
        async function addStudent() {
            const seat = parseInt(document.getElementById('seat').value);
            const name = document.getElementById('name').value.trim();
            const chinese = parseInt(document.getElementById('chinese').value);
            const english = parseInt(document.getElementById('english').value);
            const math = parseInt(document.getElementById('math').value);

            if (!seat || !name || isNaN(chinese) || isNaN(english) || isNaN(math)) {
                showMessage('請填寫所有欄位', 'error');
                return;
            }
            if (chinese < 0 || chinese > 100 || english < 0 || english > 100 || math < 0 || math > 100) {
                showMessage('成績必須在 0-100 之間', 'error');
                return;
            }

            const { error } = await db
                .from('students')
                .insert([{ seat_number: seat, name, chinese, english, math }]);

            if (error) {
                showMessage('新增失敗：' + error.message, 'error');
                return;
            }

            showMessage(`已新增 ${name} 的成績`, 'success');
            document.getElementById('seat').value = '';
            document.getElementById('name').value = '';
            document.getElementById('chinese').value = '';
            document.getElementById('english').value = '';
            document.getElementById('math').value = '';
            loadStudents();
        }

        // 刪除學生
        async function deleteStudent(id) {
            if (!confirm('確定要刪除這筆資料嗎？')) return;

            const { error } = await db.from('students').delete().eq('id', id);
            if (error) {
                showMessage('刪除失敗：' + error.message, 'error');
                return;
            }
            showMessage('已刪除', 'success');
            loadStudents();
        }
    </script>
<script src="/nav.js"></script>
</body>
</html>
