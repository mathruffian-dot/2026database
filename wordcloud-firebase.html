<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時文字雲 (Firebase 版)</title>
    <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #ff9966 0%, #ff5e62 100%);
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        header {
            text-align: center;
            padding: 30px 0 20px;
            color: #fff;
        }
        header h1 { font-size: 32px; margin-bottom: 8px; }
        header p { opacity: 0.9; }
        .badge-firebase {
            display: inline-block;
            background: #ffa611;
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        .card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #ff5e62;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #ff5e62;
        }
        button {
            padding: 12px 24px;
            background: #ff5e62;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #e54850; }

        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-box {
            flex: 1;
            background: #fff5f0;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-num {
            font-size: 24px;
            font-weight: bold;
            color: #ff5e62;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .word-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .word-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .word-item .word { color: #333; }
        .word-item .count {
            color: #ff5e62;
            font-weight: bold;
        }

        #wordcloud-canvas {
            width: 100%;
            height: 500px;
            background: #fafafa;
            border-radius: 12px;
            display: block;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }

        .live-badge {
            display: inline-block;
            background: #ff4757;
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>☁️ 即時文字雲 <span class="live-badge">LIVE</span><span class="badge-firebase">Firebase</span></h1>
            <p>輸入關鍵字，全班即時看到結果</p>
        </header>

        <div class="grid">
            <!-- 左側：輸入和統計 -->
            <div>
                <div class="card">
                    <h2>📝 提交關鍵字</h2>
                    <div class="input-row">
                        <input type="text" id="wordInput" placeholder="輸入關鍵字..." maxlength="20">
                        <button onclick="submitWord()">提交</button>
                    </div>
                    <div class="stats">
                        <div class="stat-box">
                            <div class="stat-num" id="totalCount">0</div>
                            <div class="stat-label">總提交數</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-num" id="uniqueCount">0</div>
                            <div class="stat-label">不同關鍵字</div>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <h2>📊 排行榜</h2>
                    <div class="word-list" id="wordList">
                        <div class="empty">尚無資料</div>
                    </div>
                </div>
            </div>

            <!-- 右側：文字雲 -->
            <div class="card">
                <h2>☁️ 文字雲展示</h2>
                <canvas id="wordcloud-canvas"></canvas>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
        import {
            getFirestore, collection, addDoc, onSnapshot,
            serverTimestamp, query, orderBy
        } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';

        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyAYQhNavPSce17XtvDC5xnXyl9iUhW9KjA",
            authDomain: "teacherstudy-109ef.firebaseapp.com",
            projectId: "teacherstudy-109ef",
            storageBucket: "teacherstudy-109ef.firebasestorage.app",
            messagingSenderId: "196599230156",
            appId: "1:196599230156:web:cfe55d364df3ae1b9d5c69"
        };

        const app = initializeApp(firebaseConfig);
        const fdb = getFirestore(app);
        const wordsRef = collection(fdb, 'wordcloud_words');

        // 提交關鍵字
        window.submitWord = async function() {
            const input = document.getElementById('wordInput');
            const word = input.value.trim();
            if (!word) {
                showToast('請輸入關鍵字');
                return;
            }
            try {
                await addDoc(wordsRef, {
                    word: word,
                    created_at: serverTimestamp()
                });
                input.value = '';
                showToast('已提交：' + word);
            } catch (e) {
                showToast('提交失敗：' + e.message);
                console.error(e);
            }
        };

        // 顯示提示
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // Enter 鍵提交
        document.getElementById('wordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.submitWord();
        });

        // 即時監聽資料變化（這就是 Firebase 的強項）
        const q = query(wordsRef, orderBy('created_at', 'desc'));
        onSnapshot(q, (snapshot) => {
            const words = [];
            snapshot.forEach(doc => words.push(doc.data().word));

            // 統計次數
            const counts = {};
            words.forEach(w => counts[w] = (counts[w] || 0) + 1);

            // 更新統計數字
            document.getElementById('totalCount').textContent = words.length;
            document.getElementById('uniqueCount').textContent = Object.keys(counts).length;

            // 更新排行榜
            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            const listEl = document.getElementById('wordList');
            if (sorted.length === 0) {
                listEl.innerHTML = '<div class="empty">尚無資料</div>';
            } else {
                listEl.innerHTML = sorted.map(([w, c]) =>
                    `<div class="word-item"><span class="word">${w}</span><span class="count">${c}</span></div>`
                ).join('');
            }

            // 更新文字雲
            updateWordCloud(sorted);
        }, (error) => {
            console.error('監聽錯誤：', error);
            showToast('連線失敗：' + error.message);
        });

        // 繪製文字雲
        function updateWordCloud(sorted) {
            const canvas = document.getElementById('wordcloud-canvas');
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;

            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fafafa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (sorted.length === 0) {
                ctx.fillStyle = '#bbb';
                ctx.font = '20px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('還沒有資料，輸入第一個關鍵字試試', canvas.width / 2, canvas.height / 2);
                return;
            }

            const maxCount = sorted[0][1];
            WordCloud(canvas, {
                list: sorted.map(([w, c]) => [w, Math.max(20, (c / maxCount) * 80)]),
                gridSize: 8,
                weightFactor: 1,
                fontFamily: '"Microsoft JhengHei", sans-serif',
                color: function() {
                    const colors = ['#ff5e62', '#ff9966', '#ffa611', '#e54850', '#c13584'];
                    return colors[Math.floor(Math.random() * colors.length)];
                },
                backgroundColor: '#fafafa',
                rotateRatio: 0.3,
                shuffle: true
            });
        }

        // 初始繪製空狀態
        setTimeout(() => updateWordCloud([]), 100);
    </script>
<script src="/nav.js"></script>
</body>
</html>
