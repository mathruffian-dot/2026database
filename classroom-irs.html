<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課堂 IRS 互動系統</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #0a3d62, #1e3799, #0c2461);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* 頁首 */
        header { text-align: center; padding: 28px 0 20px; }
        header h1 { font-size: 32px; font-weight: 900; }
        header h1 span { color: #fdcb6e; }
        .mode-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .mode-tab {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 50px;
            padding: 8px 24px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        .mode-tab.active {
            background: #fdcb6e;
            border-color: #fdcb6e;
            color: #000;
        }

        /* 主版面 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.4fr;
            gap: 20px;
            margin-top: 16px;
        }
        @media (max-width: 720px) { .main-grid { grid-template-columns: 1fr; } }

        /* 卡片 */
        .card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 20px;
            padding: 24px 22px;
        }
        .card h2 {
            font-size: 16px;
            font-weight: 700;
            opacity: 0.85;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        /* ── 老師控制區 ── */
        .teacher-panel { order: -1; }

        .section-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 14px;
        }
        .badge-teacher { background: rgba(253,203,110,0.25); color: #fdcb6e; }
        .badge-student { background: rgba(85,239,196,0.25); color: #55efc4; }

        label {
            display: block;
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        textarea, input[type=text] {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            padding: 10px 13px;
            resize: vertical;
            outline: none;
            font-family: inherit;
            transition: border-color .2s;
        }
        textarea:focus, input[type=text]:focus { border-color: #fdcb6e; }
        textarea::placeholder, input[type=text]::placeholder { color: rgba(255,255,255,0.35); }

        /* 選項欄（投票模式） */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .option-input-wrap { position: relative; }
        .option-label-char {
            position: absolute;
            left: 10px; top: 50%;
            transform: translateY(-50%);
            font-weight: 700;
            color: #fdcb6e;
        }
        .option-input-wrap input { padding-left: 30px; }

        .publish-btn {
            width: 100%;
            background: linear-gradient(135deg, #fdcb6e, #e17055);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 14px;
            transition: opacity .2s;
        }
        .publish-btn:hover { opacity: 0.9; }
        .publish-btn.stop {
            background: linear-gradient(135deg, #636e72, #2d3436);
            color: #fff;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 10px 14px;
            margin-top: 10px;
            font-size: 14px;
        }
        .stat-count { font-size: 22px; font-weight: 800; color: #55efc4; }

        /* ── 即時結果區 ── */
        .results-area { min-height: 220px; }

        /* 投票長條圖 */
        .vote-bars { display: flex; flex-direction: column; gap: 10px; }
        .vote-bar-row { display: flex; align-items: center; gap: 10px; }
        .vote-option-label {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            flex-shrink: 0;
        }
        .vote-bar-track {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            height: 32px;
            overflow: hidden;
        }
        .vote-bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width .5s ease;
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-size: 13px;
            font-weight: 700;
            color: #000;
        }
        .vote-count { font-size: 18px; font-weight: 800; min-width: 30px; text-align: right; }

        .bar-colors { color: ['#fdcb6e','#55efc4','#74b9ff','#fd79a8']; }
        .c0 { background: #fdcb6e; }
        .c1 { background: #55efc4; }
        .c2 { background: #74b9ff; }
        .c3 { background: #fd79a8; }

        /* 文字雲 */
        .word-cloud-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 0;
            min-height: 160px;
            align-content: flex-start;
        }
        .word-chip {
            background: rgba(255,255,255,0.12);
            border-radius: 50px;
            padding: 5px 14px;
            font-weight: 700;
            transition: all .4s;
        }

        /* 簡答列表 */
        .answer-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }
        .answer-list::-webkit-scrollbar { width: 4px; }
        .answer-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .answer-item {
            background: rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            border-left: 3px solid #74b9ff;
            animation: slideIn .3s ease;
        }
        @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
        .answer-item .ans-name { font-size: 11px; opacity: 0.55; margin-top: 4px; }

        /* ── 學生作答區 ── */
        .student-section { margin-top: 20px; }

        .current-question {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 14px;
            font-size: 16px;
            font-weight: 600;
            min-height: 50px;
            line-height: 1.5;
        }
        .waiting-msg { opacity: 0.5; font-style: italic; text-align: center; padding: 16px 0; font-size: 14px; }

        /* 投票按鈕 */
        .vote-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .vote-btn {
            padding: 18px 10px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 14px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            color: #fff;
            background: rgba(255,255,255,0.08);
            transition: all .15s;
        }
        .vote-btn:hover { transform: scale(1.04); }
        .vote-btn.v0 { border-color: #fdcb6e; }
        .vote-btn.v1 { border-color: #55efc4; }
        .vote-btn.v2 { border-color: #74b9ff; }
        .vote-btn.v3 { border-color: #fd79a8; }
        .vote-btn.selected { filter: brightness(1.3); transform: scale(1.06); }

        /* 簡答輸入 */
        .answer-submit-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .answer-submit-row input { flex: 1; }
        .answer-submit-row button {
            background: #55efc4;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        /* 名稱輸入 */
        .name-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .name-row input { font-size: 14px; }

        .submit-ok {
            color: #55efc4;
            text-align: center;
            font-weight: 700;
            margin-top: 10px;
            font-size: 14px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,80,80,0.2);
            border: 1px solid rgba(255,80,80,0.4);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 700;
            color: #ff6b6b;
            margin-left: auto;
        }
        .live-dot { width:7px; height:7px; background:#ff6b6b; border-radius:50%; animation:blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📡 課堂 <span>IRS</span> 互動系統</h1>
        <!-- 模式切換（老師用） -->
        <div class="mode-tabs">
            <button class="mode-tab active" onclick="switchMode('vote')">🗳️ 投票</button>
            <button class="mode-tab" onclick="switchMode('wordcloud')">☁️ 文字雲</button>
            <button class="mode-tab" onclick="switchMode('answer')">✏️ 簡答</button>
        </div>
    </header>

    <div class="main-grid">

        <!-- 左：老師控制 + 即時結果 -->
        <div class="card teacher-panel">
            <div class="section-badge badge-teacher">👩‍🏫 老師控制台</div>

            <!-- 題目設定 -->
            <div id="ctrl-vote">
                <label>題目</label>
                <textarea id="vote-question" rows="2" placeholder="輸入問題，例如：三角形內角和是？"></textarea>
                <div class="options-grid" id="vote-options-inputs">
                    <div class="option-input-wrap">
                        <span class="option-label-char">A</span>
                        <input type="text" class="opt-input" placeholder="選項 A">
                    </div>
                    <div class="option-input-wrap">
                        <span class="option-label-char">B</span>
                        <input type="text" class="opt-input" placeholder="選項 B">
                    </div>
                    <div class="option-input-wrap">
                        <span class="option-label-char">C</span>
                        <input type="text" class="opt-input" placeholder="選項 C">
                    </div>
                    <div class="option-input-wrap">
                        <span class="option-label-char">D</span>
                        <input type="text" class="opt-input" placeholder="選項 D">
                    </div>
                </div>
            </div>

            <div id="ctrl-wordcloud" style="display:none">
                <label>提示文字（顯示在學生頁面）</label>
                <textarea id="wc-question" rows="2" placeholder="例如：說出一個你今天學到的關鍵字"></textarea>
            </div>

            <div id="ctrl-answer" style="display:none">
                <label>題目</label>
                <textarea id="ans-question" rows="2" placeholder="例如：請用一句話說明二元一次方程式的意義"></textarea>
            </div>

            <button class="publish-btn" id="publish-btn" onclick="toggleSession()">
                📡 發佈題目
            </button>

            <!-- 即時統計 -->
            <div class="stat-row">
                <span>已收到回應</span>
                <span class="stat-count" id="response-count">0</span>
            </div>

            <!-- 即時結果顯示 -->
            <div style="margin-top:16px;">
                <h2>📊 即時結果 <span class="live-badge"><span class="live-dot"></span> LIVE</span></h2>
                <div class="results-area" id="results-area">
                    <div class="waiting-msg">發佈題目後，結果即時出現</div>
                </div>
            </div>
        </div>

        <!-- 右：學生作答 -->
        <div class="card">
            <div class="section-badge badge-student">📱 學生作答區</div>

            <div class="name-row">
                <input type="text" id="student-name" placeholder="你的姓名或座號" maxlength="10">
            </div>

            <div id="student-area">
                <div class="waiting-msg">⌛ 等待老師發佈題目…</div>
            </div>
        </div>

    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
    import {
        getFirestore,
        doc, setDoc, getDoc, onSnapshot,
        collection, addDoc, query, orderBy, where, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';

    // ── Firebase 設定 ─────────────────────────────────────
    const firebaseConfig = {
        apiKey: "AIzaSyAYQhNavPSce17XtvDC5xnXyl9iUhW9KjA",
        authDomain: "teacherstudy-109ef.firebaseapp.com",
        projectId: "teacherstudy-109ef",
        storageBucket: "teacherstudy-109ef.firebasestorage.app",
        messagingSenderId: "196599230156",
        appId: "1:196599230156:web:cfe55d364df3ae1b9d5c69"
    };

    const app = initializeApp(firebaseConfig);
    const fdb = getFirestore(app);

    // 集合與固定文件
    const sessionDoc = doc(fdb, 'irs_session', 'current');
    const responsesRef = collection(fdb, 'irs_responses');

    // ── 老師發佈 / 停止 ──────────────────────────────────
    window.publishSession = async function(mode, question, options, active) {
        await setDoc(sessionDoc, { mode, question, options, active, updatedAt: serverTimestamp() });
    };

    // ── 學生提交 ─────────────────────────────────────────
    window.submitResponse = async function(mode, question, response, name) {
        await addDoc(responsesRef, { mode, question, response, name, createdAt: serverTimestamp() });
    };

    // ── 監聽 Session（老師 + 學生都用）──────────────────
    let currentSession = null;

    onSnapshot(sessionDoc, (snap) => {
        if (!snap.exists()) return;
        currentSession = snap.data();
        window.onSessionUpdate(currentSession);
    });

    // ── 監聽回應（老師統計用）────────────────────────────
    let responseUnsub = null;

    window.listenResponses = function(mode, question) {
        if (responseUnsub) responseUnsub();
        const q = query(responsesRef,
            where('mode', '==', mode),
            where('question', '==', question),
            orderBy('createdAt', 'asc'));
        responseUnsub = onSnapshot(q, (snap) => {
            window.onResponsesUpdate(snap.docs.map(d => d.data()));
        });
    };

    window.getSessionDoc = () => sessionDoc;
    window.getCurrentSession = () => currentSession;
</script>

<!-- 互動邏輯 -->
<script>
    let currentMode = 'vote';
    let sessionActive = false;
    let hasSubmitted = false;

    // 模式切換
    window.switchMode = function(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-tab').forEach((t, i) => {
            t.classList.toggle('active', ['vote','wordcloud','answer'][i] === mode);
        });
        document.getElementById('ctrl-vote').style.display = mode === 'vote' ? '' : 'none';
        document.getElementById('ctrl-wordcloud').style.display = mode === 'wordcloud' ? '' : 'none';
        document.getElementById('ctrl-answer').style.display = mode === 'answer' ? '' : 'none';
    };

    // 發佈 / 停止
    window.toggleSession = async function() {
        const btn = document.getElementById('publish-btn');
        if (sessionActive) {
            // 停止
            await window.publishSession(currentMode, '', [], false);
            return;
        }

        // 發佈
        let question = '', options = [];
        if (currentMode === 'vote') {
            question = document.getElementById('vote-question').value.trim();
            options = Array.from(document.querySelectorAll('.opt-input')).map(i => i.value.trim());
            if (!question) { alert('請輸入題目'); return; }
        } else if (currentMode === 'wordcloud') {
            question = document.getElementById('wc-question').value.trim() || '分享你的關鍵字';
        } else {
            question = document.getElementById('ans-question').value.trim();
            if (!question) { alert('請輸入題目'); return; }
        }

        hasSubmitted = false;
        document.getElementById('response-count').textContent = '0';
        await window.publishSession(currentMode, question, options, true);
        window.listenResponses(currentMode, question);
    };

    // session 狀態更新（老師 + 學生共用）
    window.onSessionUpdate = function(session) {
        sessionActive = session.active;
        const btn = document.getElementById('publish-btn');

        if (session.active) {
            btn.textContent = '⏹ 停止收答';
            btn.classList.add('stop');
            renderStudentArea(session);
        } else {
            btn.textContent = '📡 發佈題目';
            btn.classList.remove('stop');
            document.getElementById('student-area').innerHTML =
                '<div class="waiting-msg">⌛ 等待老師發佈題目…</div>';
        }
    };

    // 回應統計更新（老師端）
    window.onResponsesUpdate = function(responses) {
        document.getElementById('response-count').textContent = responses.length;
        const session = window.getCurrentSession();
        if (!session) return;

        const area = document.getElementById('results-area');

        if (session.mode === 'vote') {
            renderVoteResults(area, session.options, responses);
        } else if (session.mode === 'wordcloud') {
            renderWordCloud(area, responses);
        } else {
            renderAnswerList(area, responses);
        }
    };

    // ── 渲染：投票結果 ──────────────────────────────────
    function renderVoteResults(area, options, responses) {
        const labels = ['A','B','C','D'];
        const colors = ['c0','c1','c2','c3'];
        const counts = [0,0,0,0];
        responses.forEach(r => {
            const idx = labels.indexOf(r.response);
            if (idx >= 0) counts[idx]++;
        });
        const total = responses.length || 1;

        area.innerHTML = '<div class="vote-bars"></div>';
        const bars = area.querySelector('.vote-bars');

        options.forEach((opt, i) => {
            if (!opt && !counts[i]) return;
            const pct = Math.round(counts[i] / total * 100);
            bars.innerHTML += `
                <div class="vote-bar-row">
                    <div class="vote-option-label">${labels[i]}</div>
                    <div class="vote-bar-track">
                        <div class="vote-bar-fill ${colors[i]}" style="width:${pct}%">
                            ${pct > 15 ? (opt || labels[i]) : ''}
                        </div>
                    </div>
                    <div class="vote-count">${counts[i]}</div>
                </div>
            `;
        });
    }

    // ── 渲染：文字雲 ─────────────────────────────────────
    function renderWordCloud(area, responses) {
        const freq = {};
        responses.forEach(r => {
            const w = (r.response || '').trim();
            if (w) freq[w] = (freq[w] || 0) + 1;
        });

        area.innerHTML = '<div class="word-cloud-area"></div>';
        const cloud = area.querySelector('.word-cloud-area');

        const maxFreq = Math.max(...Object.values(freq), 1);
        const colors = ['#fdcb6e','#55efc4','#74b9ff','#fd79a8','#a29bfe','#fab1a0'];

        Object.entries(freq)
            .sort((a,b) => b[1]-a[1])
            .forEach(([word, count], i) => {
                const size = 14 + (count / maxFreq) * 22;
                const chip = document.createElement('div');
                chip.className = 'word-chip';
                chip.style.fontSize = `${size}px`;
                chip.style.background = colors[i % colors.length] + '33';
                chip.style.color = colors[i % colors.length];
                chip.textContent = `${word} ${count > 1 ? `×${count}` : ''}`;
                cloud.appendChild(chip);
            });
    }

    // ── 渲染：簡答列表 ──────────────────────────────────
    function renderAnswerList(area, responses) {
        area.innerHTML = '<div class="answer-list"></div>';
        const list = area.querySelector('.answer-list');
        [...responses].reverse().forEach(r => {
            const item = document.createElement('div');
            item.className = 'answer-item';
            item.innerHTML = `
                ${escHtml(r.response)}
                <div class="ans-name">${escHtml(r.name || '匿名')}</div>
            `;
            list.appendChild(item);
        });
    }

    // ── 學生作答區渲染 ──────────────────────────────────
    function renderStudentArea(session) {
        const area = document.getElementById('student-area');
        if (hasSubmitted) return;

        let html = `<div class="current-question">${escHtml(session.question)}</div>`;

        if (session.mode === 'vote') {
            const labels = ['A','B','C','D'];
            html += '<div class="vote-options">';
            session.options.forEach((opt, i) => {
                if (!opt) return;
                html += `<button class="vote-btn v${i}" onclick="submitVote('${labels[i]}')">${labels[i]}　${escHtml(opt)}</button>`;
            });
            html += '</div>';
        } else if (session.mode === 'wordcloud') {
            html += `
                <div class="answer-submit-row">
                    <input type="text" id="wc-input" placeholder="輸入關鍵字" maxlength="20">
                    <button onclick="submitAnswer()">送出</button>
                </div>
            `;
        } else {
            html += `
                <div class="answer-submit-row">
                    <input type="text" id="ans-input" placeholder="輸入你的答案">
                    <button onclick="submitAnswer()">送出</button>
                </div>
            `;
        }

        area.innerHTML = html;
    }

    window.submitVote = async function(option) {
        if (hasSubmitted) return;
        const session = window.getCurrentSession();
        if (!session || !session.active) return;
        const name = document.getElementById('student-name').value.trim() || '匿名';
        await window.submitResponse('vote', session.question, option, name);
        hasSubmitted = true;
        document.getElementById('student-area').innerHTML =
            `<div class="submit-ok">✅ 已投票：${option}　感謝！</div>`;
    };

    window.submitAnswer = async function() {
        if (hasSubmitted) return;
        const session = window.getCurrentSession();
        if (!session || !session.active) return;
        const inputEl = document.getElementById('wc-input') || document.getElementById('ans-input');
        const val = inputEl.value.trim();
        if (!val) { alert('請填寫答案'); return; }
        const name = document.getElementById('student-name').value.trim() || '匿名';
        await window.submitResponse(session.mode, session.question, val, name);
        hasSubmitted = true;
        document.getElementById('student-area').innerHTML =
            '<div class="submit-ok">✅ 已送出！感謝作答</div>';
    };

    function escHtml(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
